llm:
  provider: ollama
  model: minicpm5-1b
  ollama_base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 2096

embedding:
  provider: sentence-transformers
  model: ./models/bge-small-zh-v1.5
  device: cuda
  batch_size: 32

vectorstore:
  persist_dir: ./chroma_db
  collection: docs

retrieval:
  top_k: 4
  vector_k: 10
  bm25_k: 10
  rrf_k: 60
  hybrid: true

split:
  chunk_size: 1000
  chunk_overlap: 180

server:
  api_host: 0.0.0.0
  api_port: 8001
  web_host: 0.0.0.0
  web_port: 7860

paths:
  docs_dir: ./docs_kb
